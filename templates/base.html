{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>LUNA Assistant</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <div class="navbar">
        <h2>LUNA</h2>
        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'dailytask' %}">Daily Task</a>
            <a href="{% url 'taskmanager' %}">Task Manager</a>
            <a href="{% url 'expensetracker' %}">Expense Tracker</a>
        </div>
        <div class="nav-account">
            {% if user.is_authenticated %}
                <span>Welcome, {{ user.username }}</span>
                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn" style="padding:4px 10px; font-size:14px;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a> |
                <a href="{% url 'signup' %}">Sign Up</a>
            {% endif %}
        </div>
    </div>


        {% block content %}
        {% endblock %}


</body>
</html>
